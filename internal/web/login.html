<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entraith — Sign in</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{
    --bg:#0a0a0c; --surface:#141417; --surface-2:#1b1b20;
    --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.14);
    --text:#e8e9ec; --text-muted:#9a9ba3; --text-faint:#6b6c75;
    --accent:#6e8bff; --accent-soft:rgba(110,139,255,0.16);
    --primary:#f5f5f7; --primary-text:#0a0a0c;
    --danger:#f0626b;
    --radius:8px; --radius-lg:14px;
    --font:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);font-family:var(--font);
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;
  }
  /* faint single radial wash — depth without the "scanline TV" look */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(900px 500px at 50% -10%,rgba(110,139,255,0.06),transparent 70%);
  }
  .card{
    position:relative;z-index:1;width:100%;max-width:380px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);padding:32px;
    box-shadow:0 1px 0 rgba(255,255,255,0.03) inset,0 24px 60px -20px rgba(0,0,0,0.7);
  }
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
  .brand .mark{
    width:30px;height:30px;border-radius:8px;flex:0 0 auto;
    background:linear-gradient(135deg,#2b2f6b,#6e8bff);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:15px;
  }
  .brand .name{font-size:15px;font-weight:600;letter-spacing:-0.01em}
  .brand .name span{color:var(--text-faint);font-weight:500}
  h1{font-size:19px;font-weight:600;letter-spacing:-0.02em;margin-bottom:4px}
  .sub{color:var(--text-muted);font-size:13px;margin-bottom:24px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:6px}
  .field input{
    width:100%;background:var(--surface-2);border:1px solid var(--border);
    color:var(--text);font-family:var(--font);font-size:14px;
    padding:10px 12px;border-radius:var(--radius);outline:none;
    transition:border-color .15s,box-shadow .15s;
  }
  .field input::placeholder{color:var(--text-faint)}
  .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .btn{
    width:100%;padding:10px 14px;margin-top:8px;
    background:var(--primary);color:var(--primary-text);
    border:1px solid transparent;border-radius:var(--radius);
    font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;
    transition:opacity .15s,transform .02s;
  }
  .btn:hover{opacity:0.9}
  .btn:active{transform:translateY(0.5px)}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .error{
    color:var(--danger);font-size:13px;text-align:center;
    margin-top:14px;min-height:18px;
  }
  .hint{font-size:12px;color:var(--text-faint);text-align:center;margin-top:22px;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="mark">E</div>
    <div class="name">Entraith <span>Console</span></div>
  </div>

  <h1>Sign in</h1>
  <div class="sub">Enter your operator credentials to continue.</div>

  <form id="loginForm" onsubmit="doLogin(event)" autocomplete="off">
    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username" spellcheck="false" placeholder="operator" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
    </div>
    <button class="btn" type="submit" id="submitBtn">Sign in</button>
  </form>

  <div class="error" id="errorMsg"></div>
  <div class="hint">Access is monitored. Authorized operators only.</div>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('errorMsg');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ username, password })
    });
    const data = await r.json().catch(() => ({}));
    if (r.ok) {
      const next = new URLSearchParams(window.location.search).get('next') || '/';
      window.location.replace(next);
    } else if (r.status === 429) {
      errEl.textContent = data.error || 'Too many attempts. Try again later.';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    } else {
      errEl.textContent = data.error || 'Invalid credentials';
      document.getElementById('password').value = '';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  } catch(_) {
    errEl.textContent = 'Network error — server unreachable';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}
</script>
</body>
</html>
