<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENTRAITH // Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
  :root {
    --bg:#04070b;--bg2:#05080e;--bg3:#111927;--border:#192438;
    --accent:#0078d4;--accent2:#c50f1f;--accent3:#107c10;
    --text:#b8c8d8;--text-dim:#3d5166;--text-bright:#e0eaf4;
    --mono:'JetBrains Mono',monospace;--sans:'JetBrains Mono',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;
    display:flex;align-items:center;justify-content:center;min-height:100vh;
  }
  .card{
    position:relative;z-index:1;
    background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--accent);
    padding:40px 36px;width:380px;border-radius:0;
    box-shadow:0 0 80px rgba(0,0,0,0.7),0 0 40px rgba(0,120,212,0.06);
  }
  .logo{
    font-family:var(--mono);font-size:18px;font-weight:700;
    letter-spacing:0.45em;text-transform:uppercase;color:var(--accent);
    text-shadow:0 0 28px rgba(0,120,212,0.5);
    text-align:center;margin-bottom:4px;
  }
  .subtitle{
    font-size:9px;letter-spacing:0.25em;text-transform:uppercase;
    color:var(--text-dim);text-align:center;margin-bottom:32px;
  }
  .field{margin-bottom:14px}
  .field label{
    display:block;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;
    color:var(--text-dim);margin-bottom:5px;
  }
  .field input{
    width:100%;background:var(--bg3);border:1px solid var(--border);
    color:var(--text-bright);font-family:var(--mono);font-size:13px;
    padding:9px 12px;border-radius:0;outline:none;
    transition:border-color 0.12s,box-shadow 0.12s;
  }
  .field input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 1px rgba(0,120,212,0.2);
  }
  .btn{
    width:100%;padding:10px;margin-top:6px;
    background:rgba(0,120,212,0.06);
    border:1px solid var(--accent);color:var(--accent);
    font-family:var(--mono);font-size:11px;letter-spacing:0.2em;
    text-transform:uppercase;cursor:pointer;border-radius:0;
    transition:background 0.12s;
  }
  .btn:hover{background:rgba(0,120,212,0.15)}
  .btn:active{background:rgba(0,120,212,0.25)}
  .btn:disabled{opacity:0.4;cursor:not-allowed}
  .error{
    color:var(--accent2);font-size:11px;text-align:center;
    margin-top:12px;min-height:16px;letter-spacing:0.05em;
  }
  .hint{
    font-size:9px;color:var(--text-dim);text-align:center;
    margin-top:20px;letter-spacing:0.1em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">ENTRAITH</div>
  <div class="subtitle">Operator Console · Authentication Required</div>

  <form id="loginForm" onsubmit="doLogin(event)" autocomplete="off">
    <div class="field">
      <label>Username</label>
      <input id="username" type="text" autocomplete="username" spellcheck="false" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn" type="submit" id="submitBtn">→ Authenticate</button>
  </form>

  <div class="error" id="errorMsg"></div>
  <div class="hint">All sessions are logged. Unauthorized access is prohibited.</div>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('errorMsg');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = '...';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ username, password })
    });
    const data = await r.json().catch(() => ({}));
    if (r.ok) {
      const next = new URLSearchParams(window.location.search).get('next') || '/';
      window.location.replace(next);
    } else {
      errEl.textContent = data.error || 'Invalid credentials';
      document.getElementById('password').value = '';
      btn.disabled = false;
      btn.textContent = '→ Authenticate';
    }
  } catch(_) {
    errEl.textContent = 'Network error — server unreachable';
    btn.disabled = false;
    btn.textContent = '→ Authenticate';
  }
}
</script>
</body>
</html>
