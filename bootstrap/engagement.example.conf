# RTO Tool - Engagement Config
# Format: key = value (one per line, # for comments)
# Deploy fresh for each client on an isolated VM.

engagement.id = CLIENT-2026-RTO-001
engagement.client_code = CLIENTX
engagement.operator = operator
engagement.retention_days = 30

server.host = 0.0.0.0
server.port = 8443

auth.secret_key = CHANGE_THIS_TO_STRONG_RANDOM_SECRET

# Microsoft Entra ID settings
# tenant_id: use "common" for any org, or specific tenant UUID to target one org
campaign.tenant_id = common

# client_id: Azure App Client ID
# Well-known public client IDs (no app registration needed):
#   Microsoft Office:         d3590ed6-52b3-4102-aeff-aad2292ab01c
#   Azure CLI:                04b07795-8ddb-461a-bbee-02f9e1bf7b46
#   Microsoft Teams:          1fec8e78-bce4-4aaf-ab1b-5451cc387264
#   Azure PowerShell:         1950a258-227b-4e31-a9cf-717495945fc2
campaign.client_id = d3590ed6-52b3-4102-aeff-aad2292ab01c

# Scope to request (determines what the captured token can access)
campaign.scope = https://graph.microsoft.com/.default offline_access openid profile

# Polling interval in seconds (minimum 5, Microsoft requirement)
campaign.poll_interval = 5

# Total seconds before device code expires (Microsoft default: 900 = 15 min)
campaign.poll_timeout = 900

storage.artifacts_path = /opt/entraith/data/artifacts
storage.exports_path = /opt/entraith/data/exports
