# RTO Tool - Engagement Config
# Format: key = value (one per line, # for comments)
# Deploy fresh for each client on an isolated VM.

engagement.id = CLIENT-2026-RTO-001
engagement.client_code = CLIENTX
engagement.operator = operator
engagement.retention_days = 30

server.host = 127.0.0.1
server.port = 8443

auth.secret_key = CHANGE_THIS_TO_STRONG_RANDOM_SECRET

# Microsoft Entra ID settings
# tenant_id: use "common" for any org, or specific tenant UUID to target one org
campaign.tenant_id = common

# client_id: Azure App Client ID
# Well-known public client IDs (no app registration needed):
#   Microsoft Office:         d3590ed6-52b3-4102-aeff-aad2292ab01c
#   Azure CLI:                04b07795-8ddb-461a-bbee-02f9e1bf7b46
#   Microsoft Teams:          1fec8e78-bce4-4aaf-ab1b-5451cc387264
#   Azure PowerShell:         1950a258-227b-4e31-a9cf-717495945fc2
campaign.client_id = d3590ed6-52b3-4102-aeff-aad2292ab01c

# Scope to request during device code capture.
# Use minimal identity scopes — these work on every tenant without admin consent.
# offline_access guarantees a proper refresh token for cross-resource Token Exchange.
# Do NOT use /.default or explicit resource scopes (User.Read, etc.) — first-party
# clients like Office 365 require preauthorization for those on locked-down tenants.
# Use Token Exchange in the Tools tab to obtain Graph/My Sign-ins/etc. tokens.
campaign.scope = offline_access openid profile email

# Use v1 OAuth2 endpoints for capture (resource= instead of scope=).
# Required when you need to exchange the captured token for the My Sign-ins
# resource (19db86c3-...) or any other v1-only resource. When true, set
# campaign.scope to the target resource URL (e.g. https://graph.microsoft.com).
# v1-captured tokens work with both v1 and v2 exchange endpoints.
campaign.capture_v1 = true

# Force MFA during device code authentication.
# When true, adds amr_values=ngcmfa to the device code request, requiring the
# target to complete MFA (Authenticator app push/TOTP). The captured token will
# then have amr=["pwd","mfa"] claims, which are required to exchange for the
# My Sign-ins resource (19db86c3-...) and manage security info via the MFA tab.
campaign.require_mfa = true

# Polling interval in seconds (minimum 5, Microsoft requirement)
campaign.poll_interval = 5

# Total seconds before device code expires (Microsoft default: 900 = 15 min)
campaign.poll_timeout = 900

storage.artifacts_path = /opt/entraith/data/artifacts
storage.exports_path = /opt/entraith/data/exports
